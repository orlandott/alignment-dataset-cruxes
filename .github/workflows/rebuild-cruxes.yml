name: Rebuild cruxes.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build crux graph
        # Keyless: PCA(3) + k-means clusters are recomputed, post summaries +
        # double cruxes use the heuristic method, and top comments are fetched
        # from the public LessWrong GraphQL API (cached in data/processed/).
        run: python scripts/build_crux_map.py

      - name: Commit updated cruxes.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cruxes.json data/processed/comments_cache.jsonl
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: rebuild cruxes.json from pipeline"
          git push
